<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page blocked</title>
    <link rel="icon" type="image/svg+xml" href="aegis-shield.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="icons/icon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
    <link rel="stylesheet" href="aegis-tokens.css" />
    <link rel="stylesheet" href="aegis-components.css" />
    <link rel="stylesheet" href="block.css" />
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <img src="aegis-shield.svg" alt="" />
        <span class="wordmark">Aegis</span>
      </div>
      <h1>This page isn't available</h1>
      <p id="reason">This page may not be suitable.</p>
      <p class="url" id="url"></p>
      <button id="back" type="button">← Go back</button>
      <div id="prize-section" hidden>
        <p id="prize-balance" class="prize-balance"></p>
        <p class="prize-lead muted">Spend points for more time — no waiting:</p>
        <div id="prize-packages" class="prize-packages"></div>
        <p id="prize-status" aria-live="polite"></p>
        <p class="prize-or muted">or ask your parent:</p>
      </div>
      <div id="request-section">
        <textarea
          id="note"
          rows="2"
          maxlength="500"
          placeholder="Optional: tell your parent why (e.g. it's for homework)"
        ></textarea>
        <button id="request-btn" class="primary" type="button">Request access</button>
        <button id="check-btn" class="primary" type="button" hidden>Check if approved</button>
        <p id="request-status"></p>
      </div>
    </main>
    <script src="block.js"></script>
  </body>
</html>
