<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Aegis — review requests</title>
    <link rel="stylesheet" href="/static/aegis-tokens.css" />
    <link rel="stylesheet" href="/static/aegis-components.css" />
    <style>
      /* Page-specific layout only — the shared look comes from the linked stylesheets. */
      main { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
      .brand { margin-bottom: 1.25rem; }
      h2 { margin: 1.75rem 0 0.75rem; }
      .card { margin-bottom: 0.85rem; }
      .row { display: flex; gap: 0.5rem; }
      .head { display: flex; justify-content: space-between; gap: 0.75rem; align-items: baseline; }
      .host { color: var(--fg-2); font-size: 0.85rem; white-space: nowrap; }
      .reason, .note { margin: 0.4rem 0; }
      .note { color: var(--fg-2); }
      .entry-label { display: block; margin: 0.75rem 0 0.35rem; color: var(--fg-2); font-size: 0.85rem; }
      input.entry { width: 100%; }
      .actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
      textarea.reject-note { width: 100%; margin-top: 0.5rem; }
      button.reject-confirm { margin-top: 0.5rem; }
      .meta { display: flex; gap: 0.4rem; align-items: center; white-space: nowrap; }
    </style>
  </head>
  <body>
    <main>
      <header class="brand">
        <img src="/static/aegis-shield.svg" alt="" />
        <span class="wordmark">Aegis</span>
      </header>
      <h1>Access requests</h1>

      <section id="pin-panel">
        <p class="muted">Enter the parent PIN to review what your kid asked to unblock.</p>
        <div class="row">
          <input id="pin" type="password" placeholder="Parent PIN" autocomplete="off" />
          <button id="pin-btn" class="primary" type="button">Unlock</button>
        </div>
        <p id="pin-error" class="error"></p>
      </section>

      <section id="requests-panel" hidden>
        <h2>Pending</h2>
        <div id="pending-list"></div>
        <p id="pending-empty" class="muted" hidden>No pending requests.</p>
        <h2>Recent decisions</h2>
        <div id="recent-list"></div>
        <p id="recent-empty" class="muted" hidden>Nothing decided yet.</p>
      </section>
    </main>
    <div id="toast" hidden></div>

    <script>
      // All request fields (url, note, reason) are child-controlled, so this page renders them
      // ONLY via textContent / value — never innerHTML — to stay XSS-safe.
      const PIN_HEADER = "X-Guardian-Parent-Pin";
      let pin = "";
      const $ = (id) => document.getElementById(id);

      function el(tag, props = {}, ...children) {
        const node = document.createElement(tag);
        for (const [k, v] of Object.entries(props)) {
          if (v === null || v === undefined || v === false) continue;
          if (k === "class") node.className = v;
          else if (k === "text") node.textContent = v;
          else node.setAttribute(k, v === true ? "" : v);
        }
        for (const c of children) if (c) node.append(c);
        return node;
      }

      function safeHref(url) {
        return /^https?:\/\//i.test(url || "") ? url : null;
      }

      function timeAgo(iso) {
        const t = Date.parse(iso || "");
        if (Number.isNaN(t)) return "";
        const s = Math.max(0, Math.floor((Date.now() - t) / 1000));
        if (s < 60) return s + "s ago";
        const m = Math.floor(s / 60);
        if (m < 60) return m + "m ago";
        const h = Math.floor(m / 60);
        if (h < 24) return h + "h ago";
        return Math.floor(h / 24) + "d ago";
      }

      function api(path, opts = {}) {
        const headers = Object.assign({ [PIN_HEADER]: pin }, opts.headers || {});
        return fetch(path, Object.assign({}, opts, { headers }));
      }

      async function unlock() {
        pin = $("pin").value.trim();
        $("pin").value = ""; // don't leave the PIN sitting in the DOM
        $("pin-error").textContent = "";
        let r;
        try {
          r = await api("/review/requests");
        } catch (_e) {
          $("pin-error").textContent = "Could not reach the guardian service.";
          return;
        }
        if (r.status === 503) {
          $("pin-error").textContent = "No parent PIN is set up yet. Taking you to setup…";
          window.location.replace("/setup");
          return;
        }
        if (r.status === 403) {
          $("pin-error").textContent = "Wrong PIN.";
          return;
        }
        if (!r.ok) {
          $("pin-error").textContent = "Could not load requests.";
          return;
        }
        $("pin-panel").hidden = true;
        $("requests-panel").hidden = false;
        render(await r.json());
      }

      async function reload() {
        const r = await api("/review/requests");
        if (r.ok) render(await r.json());
      }

      function pendingCard(req) {
        const card = el("div", { class: "card" });
        const link = safeHref(req.url)
          ? el("a", { href: req.url, target: "_blank", rel: "noopener noreferrer", class: "url", text: req.url })
          : el("span", { class: "url", text: req.url });
        const meta = el(
          "span",
          { class: "meta" },
          req.profile ? el("span", { class: "badge profile", text: req.profile }) : null,
          el("span", { class: "host", text: req.host || "" })
        );
        card.append(el("div", { class: "head" }, link, meta));
        if (req.reason) card.append(el("p", { class: "reason", text: "Blocked: " + req.reason }));
        if (req.note) card.append(el("p", { class: "note", text: "Note: " + req.note }));
        card.append(el("p", { class: "muted", text: timeAgo(req.created_ts) }));

        card.append(el("label", { class: "entry-label", text: "Allow (edit to broaden — e.g. host/* or a topic like “BeyBlade anime”):" }));
        const entry = el("input", { class: "entry", "aria-label": "Whitelist entry" });
        entry.value = req.url;
        card.append(entry);

        const approve = el("button", { class: "approve", type: "button", text: "Approve" });
        approve.addEventListener("click", () => decide(req.id, "approve", { whitelist_entry: entry.value.trim() }));

        const reject = el("button", { class: "reject", type: "button", text: "Reject" });
        const noteBox = el("textarea", { class: "reject-note", rows: "2", placeholder: "Optional note (why)", hidden: true });
        const rejectConfirm = el("button", { class: "reject-confirm", type: "button", text: "Confirm reject", hidden: true });
        reject.addEventListener("click", () => {
          noteBox.hidden = false;
          rejectConfirm.hidden = false;
          reject.hidden = true;
        });
        rejectConfirm.addEventListener("click", () => decide(req.id, "reject", { note: noteBox.value.trim() }));

        card.append(el("div", { class: "actions" }, approve, reject), noteBox, rejectConfirm);
        return card;
      }

      function recentRow(req) {
        return el(
          "div",
          { class: "recent-row" },
          el("span", { class: "badge " + req.status, text: req.status }),
          req.profile ? el("span", { class: "badge profile", text: req.profile }) : null,
          el("span", { class: "url", text: req.whitelist_entry || req.url }),
          el("span", { class: "muted", text: timeAgo(req.decided_ts) })
        );
      }

      function render(data) {
        const pending = data.pending || [];
        const recent = data.recent || [];
        $("pending-list").replaceChildren(...pending.map(pendingCard));
        $("pending-empty").hidden = pending.length > 0;
        $("recent-list").replaceChildren(...recent.map(recentRow));
        $("recent-empty").hidden = recent.length > 0;
      }

      async function decide(id, decision, extra) {
        let r;
        try {
          r = await api("/review/decision", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(Object.assign({ id, decision }, extra)),
          });
        } catch (_e) {
          toast("Could not reach the guardian service.");
          return;
        }
        if (r.ok) {
          toast(decision === "approve" ? "Approved ✓" : "Rejected");
          reload();
        } else {
          toast("Action failed (" + r.status + ").");
        }
      }

      let toastTimer;
      function toast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.hidden = false;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { t.hidden = true; }, 3000);
      }

      $("pin-btn").addEventListener("click", unlock);
      $("pin").addEventListener("keydown", (e) => {
        if (e.key === "Enter") unlock();
      });

      // First run: if no PIN exists yet, guide the parent to the setup wizard instead of
      // showing a dead-end unlock form.
      (async () => {
        try {
          const r = await fetch("/setup/status");
          if (r.ok && !(await r.json()).pin_configured) {
            window.location.replace("/setup");
          }
        } catch (_e) {
          // Network error: stay here; unlock() will surface any problem on submit.
        }
      })();
    </script>
  </body>
</html>
