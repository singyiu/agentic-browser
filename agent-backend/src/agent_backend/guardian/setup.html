<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Aegis — first-time setup</title>
    <link rel="icon" type="image/svg+xml" href="/static/aegis-shield.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/icon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/static/icons/icon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon-180.png" />
    <link rel="stylesheet" href="/static/aegis-tokens.css?v=2" />
    <link rel="stylesheet" href="/static/aegis-components.css?v=4" />
    <style>
      /* Page-specific layout only — the shared look comes from the linked stylesheets. */
      main { max-width: 520px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
      .brand { margin-bottom: 1.25rem; }
      label.field { display: block; margin: 0.9rem 0 0.3rem; color: var(--fg-2); font-size: 0.9rem; font-weight: 600; }
      label.field:first-child { margin-top: 0; }
      .pin-row { display: flex; gap: 0.5rem; }
      input { width: 100%; }
      #pin, #confirm { letter-spacing: 0.25em; }
      button.primary { width: 100%; margin-top: 1.1rem; }
      .hint { font-size: 0.82rem; margin: 0.35rem 0 0; min-height: 1.1em; }
      .error { margin-top: 0.6rem; }
      .success-icon { font-size: 2.2rem; margin: 0; }
      .status-title { font-weight: 600; color: var(--fg-2); margin: 0 0 0.5rem; }
      .health-rows { list-style: none; padding: 0; margin: 0; }
      .health-rows li { display: flex; gap: 0.5rem; align-items: baseline; padding: 0.25rem 0; font-size: 0.9rem; }
      .health-rows .glyph { flex: none; width: 1.1em; text-align: center; font-weight: 700; }
      .health-rows .ok { color: var(--aegis-sage, #4a7d5f); }
      .health-rows .bad { color: var(--aegis-terracotta, #c1654a); }
      .health-rows .muted { color: var(--fg-3, #8a8a8a); }
    </style>
  </head>
  <body>
    <main>
      <header class="brand">
        <img src="/static/aegis-shield.svg" alt="" />
        <span class="wordmark">Aegis</span>
      </header>
      <h1>First-time setup</h1>

      <section id="loading-panel">
        <p class="lead">Loading…</p>
      </section>

      <!-- First-run wizard -->
      <section id="setup-panel" hidden>
        <div class="card">
          <p class="lead" id="intro"></p>
        </div>
        <div class="card" id="status-card" hidden>
          <p class="status-title">Guardian status</p>
          <ul id="health-rows" class="health-rows"></ul>
        </div>
        <div class="card">
          <label class="field" for="pin">Create a PIN (4–8 digits)</label>
          <div class="pin-row">
            <input id="pin" type="password" inputmode="numeric" autocomplete="off"
                   maxlength="8" placeholder="••••" aria-label="New PIN" />
            <button id="toggle" class="ghost" type="button" aria-label="Show or hide the PIN">Show</button>
          </div>
          <p id="pin-hint" class="hint"></p>

          <label class="field" for="confirm">Re-enter the PIN</label>
          <input id="confirm" type="password" inputmode="numeric" autocomplete="off"
                 maxlength="8" placeholder="••••" aria-label="Confirm PIN" />
          <p id="match-hint" class="hint"></p>

          <button id="create" class="primary" type="button" disabled>Create PIN</button>
          <p id="error" class="error"></p>
        </div>
      </section>

      <!-- Already set up / success -->
      <section id="done-panel" hidden>
        <div class="card">
          <p class="success-icon">✅</p>
          <p id="done-msg" class="lead"></p>
          <p id="done-next" class="hint"></p>
          <p><a class="cta" href="/">Go to the dashboard →</a></p>
        </div>
      </section>
    </main>

    <script>
      // This page renders only static, app-controlled strings, and does so via textContent
      // (never innerHTML) to stay XSS-safe even if a message ever carries untrusted text.
      const $ = (id) => document.getElementById(id);

      // Mirror of the server-side rule (validate_pin_format): ASCII digits, 4–8 long.
      const isValidPin = (v) => /^[0-9]{4,8}$/.test(v);

      function show(panelId) {
        for (const id of ["loading-panel", "setup-panel", "done-panel"]) {
          $(id).hidden = id !== panelId;
        }
      }

      function showDone(msg, next) {
        $("done-msg").textContent = msg;
        $("done-next").textContent = next || "";
        show("done-panel");
      }

      // Build one status row (glyph + text), XSS-safe via textContent.
      function healthRow(glyph, glyphClass, text) {
        const li = document.createElement("li");
        const g = document.createElement("span");
        g.className = "glyph " + glyphClass;
        g.textContent = glyph;
        const t = document.createElement("span");
        t.textContent = text;
        li.append(g, t);
        return li;
      }

      // First-run readiness check. /setup/health is open before a PIN exists; once a PIN is set it
      // becomes PIN-gated, so this only populates during first-time setup.
      let lanUrl = "";
      async function renderHealth() {
        let h;
        try {
          const r = await fetch("/setup/health");
          if (!r.ok) return;
          h = await r.json();
        } catch (_e) {
          return;
        }
        const rows = $("health-rows");
        rows.replaceChildren();
        if (h.claude_token && h.claude_token.present) {
          rows.append(healthRow("✓", "ok", "Claude login connected."));
        } else {
          rows.append(
            healthRow("•", "bad", "Claude login needed — run “claude setup-token” and paste it into agent-backend/.env.")
          );
        }
        const net = h.network || {};
        if (net.lan_bound && net.lan_url) {
          lanUrl = net.lan_url;
          rows.append(healthRow("✓", "ok", "Kid Macs can reach this guardian at " + net.lan_url));
        } else if (!net.lan_bound) {
          rows.append(
            healthRow("•", "bad", "Reachable on this Mac only — set GUARDIAN_HOST=0.0.0.0 so kid Macs can connect.")
          );
        } else {
          rows.append(healthRow("•", "muted", "Network address not detected — connect to Wi-Fi or Ethernet."));
        }
        if (h.firewall && h.firewall.state === "on") {
          rows.append(
            healthRow("!", "muted", "macOS firewall is on — allow the guardian if a kid Mac can’t connect.")
          );
        }
        $("status-card").hidden = false;
      }

      function refreshValidity() {
        const pin = $("pin").value;
        const confirm = $("confirm").value;
        const pinHint = $("pin-hint");
        const matchHint = $("match-hint");

        if (!pin) {
          pinHint.textContent = "Use 4 to 8 digits.";
          pinHint.className = "hint";
        } else if (!isValidPin(pin)) {
          pinHint.textContent = "Digits only — 4 to 8 of them.";
          pinHint.className = "hint bad";
        } else {
          pinHint.textContent = "Looks good.";
          pinHint.className = "hint ok";
        }

        if (!confirm) {
          matchHint.textContent = "";
          matchHint.className = "hint";
        } else if (pin !== confirm) {
          matchHint.textContent = "The two PINs don't match yet.";
          matchHint.className = "hint bad";
        } else {
          matchHint.textContent = "PINs match.";
          matchHint.className = "hint ok";
        }

        $("create").disabled = !(isValidPin(pin) && pin === confirm);
      }

      async function createPin() {
        const pin = $("pin").value;
        $("error").textContent = "";
        if (!isValidPin(pin) || pin !== $("confirm").value) {
          refreshValidity();
          return;
        }
        $("create").disabled = true;
        let r;
        try {
          r = await fetch("/setup/pin", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pin }),
          });
        } catch (_e) {
          $("error").textContent = "Could not reach the guardian service.";
          $("create").disabled = false;
          return;
        }
        if (r.ok) {
          $("pin").value = "";
          $("confirm").value = "";
          showDone(
            "Your parent PIN is set. Keep it secret from your child — you'll enter it to " +
              "approve or block the sites they ask to unblock.",
            "Next: on the dashboard, choose “Add a kid” to set up each child's Mac." +
              (lanUrl ? "  Kid Macs connect to this guardian at " + lanUrl + "." : "")
          );
          return;
        }
        if (r.status === 409) {
          showDone("A parent PIN is already set up on this guardian.");
          return;
        }
        let msg = "Could not save the PIN. Please try again.";
        if (r.status === 422) {
          try {
            msg = (await r.json()).error || msg;
          } catch (_e) {
            /* keep the default message */
          }
        }
        $("error").textContent = msg;
        $("create").disabled = false;
      }

      async function init() {
        let configured = false;
        try {
          const r = await fetch("/setup/status");
          if (r.ok) configured = !!(await r.json()).pin_configured;
        } catch (_e) {
          // If status can't be read, fall through to the wizard; the POST surfaces real errors.
        }
        if (configured) {
          showDone("A parent PIN is already set up on this guardian.");
          return;
        }
        $("intro").textContent =
          "Welcome! Create a parent PIN to finish setting up the guardian. This PIN lets you — " +
          "the parent — approve or block the sites your child asks to unblock. Pick something " +
          "you'll remember but your child won't guess.";
        show("setup-panel");
        renderHealth();
        $("pin").focus();
        refreshValidity();
      }

      $("pin").addEventListener("input", refreshValidity);
      $("confirm").addEventListener("input", refreshValidity);
      $("create").addEventListener("click", createPin);
      $("confirm").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !$("create").disabled) createPin();
      });
      $("toggle").addEventListener("click", () => {
        const hidden = $("pin").type === "password";
        $("pin").type = $("confirm").type = hidden ? "text" : "password";
        $("toggle").textContent = hidden ? "Hide" : "Show";
      });

      init();
    </script>
  </body>
</html>
