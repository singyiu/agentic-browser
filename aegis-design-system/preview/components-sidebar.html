<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body><div class="card" style="padding:0; overflow:hidden">
<div style="display:flex; min-height:300px">
  <aside style="width:200px; background:var(--bg-1); border-right:1px solid var(--border-1); padding:18px 14px; display:flex; flex-direction:column; gap:2px">
    <div style="display:flex; align-items:center; gap:8px; padding:0 8px 14px">
      <svg width="22" height="25" viewBox="0 0 64 72" fill="none"><path d="M32 4 C 32 4, 14 8, 6 10 C 6 10, 4 38, 14 54 C 22 66, 32 70, 32 70 C 32 70, 42 66, 50 54 C 60 38, 58 10, 58 10 C 50 8, 32 4, 32 4 Z" fill="oklch(0.66 0.14 38)"/><path d="M32 18 C 32 18, 22 21, 18 22 C 18 22, 17 38, 22 46 C 26 53, 32 56, 32 56 C 32 56, 38 53, 42 46 C 47 38, 46 22, 46 22 C 42 21, 32 18, 32 18 Z" fill="oklch(0.945 0.018 78)"/></svg>
      <span style="font-family:var(--font-display); font-size:22px; font-weight:500">Aegis</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px; padding:9px 11px; background:var(--aegis-terracotta-soft); color:var(--aegis-terracotta-3); border-radius:10px; font-size:13px; font-weight:600">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
      <span style="flex:1">Review</span>
      <span style="font-family:var(--font-mono); font-size:11px; font-weight:600; padding:1px 7px; border-radius:999px; background:var(--aegis-terracotta); color:var(--aegis-cream)">3</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px; padding:9px 11px; color:var(--fg-1); border-radius:10px; font-size:13px; font-weight:500">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--fg-2)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 6h10"/><path d="M11 12h10"/><path d="M11 18h10"/><path d="M3 6l2 2 3-3"/><path d="M3 12l2 2 3-3"/><path d="M3 18l2 2 3-3"/></svg>
      Whitelist
    </div>
    <div style="display:flex; align-items:center; gap:10px; padding:9px 11px; color:var(--fg-1); border-radius:10px; font-size:13px; font-weight:500">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--fg-2)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
      Recent
    </div>
    <div style="margin-top:14px; font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-2); padding:0 11px">Teens</div>
    <div style="display:flex; align-items:center; gap:9px; padding:7px 11px; border-radius:8px; font-size:13px; font-weight:500">
      <div style="width:20px; height:20px; border-radius:999px; background:oklch(0.93 0.04 45); color:var(--aegis-terracotta-3); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:12px; font-weight:600">A</div>
      <span style="flex:1; text-transform:capitalize">alex</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-2)">2</span>
    </div>
    <div style="display:flex; align-items:center; gap:9px; padding:7px 11px; border-radius:8px; font-size:13px; font-weight:500">
      <div style="width:20px; height:20px; border-radius:999px; background:oklch(0.93 0.03 145); color:var(--aegis-sage); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:12px; font-weight:600">S</div>
      <span style="flex:1; text-transform:capitalize">sam</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-2)">1</span>
    </div>
  </aside>
  <div style="flex:1; padding:24px 20px; display:flex; flex-direction:column; gap:10px">
    <div class="label">Sidebar nav</div>
    <div style="font-size:14px; color:var(--fg-2); line-height:1.5">264px column with the Aegis mark, primary nav, per-teen list with counts, and a signed-in status footer.</div>
  </div>
</div>
</div></body></html>
