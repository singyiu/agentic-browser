<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.dot { width:14px; height:14px; border-radius:999px; }
.cell { display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px; background:var(--bg-2); border-radius:14px; box-shadow:inset 0 0 0 1px var(--border-1); flex:1; }
.cell .digit { font-family:var(--font-display); font-size:34px; color:var(--fg-1); line-height:1; }
.cell .name { font-size:11px; color:var(--fg-2); font-weight:600; letter-spacing:0.04em; text-transform:uppercase; }
</style>
</head><body><div class="card">
<div class="label">PIN entry — setup wizard</div>
<div style="display:flex; gap:10px; max-width:420px">
  <div class="cell"><div class="digit">7</div><div class="name">1</div></div>
  <div class="cell"><div class="digit">2</div><div class="name">2</div></div>
  <div class="cell"><div class="digit">4</div><div class="name">3</div></div>
  <div class="cell" style="box-shadow: inset 0 0 0 2px var(--aegis-terracotta), 0 0 0 4px var(--aegis-terracotta-soft)"><div class="digit" style="color:var(--aegis-terracotta)">|</div><div class="name">4</div></div>
  <div class="cell" style="opacity:0.5"><div class="digit">·</div><div class="name">5</div></div>
  <div class="cell" style="opacity:0.5"><div class="digit">·</div><div class="name">6</div></div>
</div>
<div style="font-size:13px; color:var(--fg-2); margin-top:12px">4 to 8 digits — your kid never sees it.</div>
</div></body></html>
