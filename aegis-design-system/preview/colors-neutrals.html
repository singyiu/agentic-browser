<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body><div class="card">
<div class="label">Neutrals — cream to cocoa</div>
<div class="row">
  <div class="swatch on-light" style="background:var(--aegis-cream)"><span class="name">Cream</span><span class="code">--bg-1</span></div>
  <div class="swatch on-light" style="background:var(--aegis-linen)"><span class="name">Linen</span><span class="code">--bg-2</span></div>
  <div class="swatch on-light" style="background:var(--aegis-oat)"><span class="name">Oat</span><span class="code">--bg-3</span></div>
  <div class="swatch on-light" style="background:var(--aegis-sand)"><span class="name">Sand</span><span class="code">--border-1</span></div>
  <div class="swatch on-dark" style="background:var(--aegis-stone)"><span class="name">Stone</span><span class="code">--fg-2</span></div>
  <div class="swatch on-dark" style="background:var(--aegis-cocoa)"><span class="name">Cocoa</span><span class="code">--fg-1</span></div>
  <div class="swatch on-dark" style="background:var(--aegis-espresso)"><span class="name">Espresso</span><span class="code">espresso</span></div>
</div>
</div></body></html>
