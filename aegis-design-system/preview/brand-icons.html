<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
.icon-cell { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; min-width:60px; }
.icon-cell .name { font-family:var(--font-mono); font-size:10px; color:var(--fg-2); }
.icon-cell svg { color:var(--fg-1); }
</style>
</head><body><div class="card">
<div class="label">Iconography — Lucide, 1.5px stroke <span style="color:var(--aegis-block); font-weight:600">(substitution)</span></div>
<div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:4px">
  <div class="icon-cell"><i data-lucide="shield-check" style="width:24px;height:24px"></i><span class="name">shield-check</span></div>
  <div class="icon-cell"><i data-lucide="shield-off" style="width:24px;height:24px"></i><span class="name">shield-off</span></div>
  <div class="icon-cell"><i data-lucide="lock" style="width:24px;height:24px"></i><span class="name">lock</span></div>
  <div class="icon-cell"><i data-lucide="key-round" style="width:24px;height:24px"></i><span class="name">key-round</span></div>
  <div class="icon-cell"><i data-lucide="user-round" style="width:24px;height:24px"></i><span class="name">user-round</span></div>
  <div class="icon-cell"><i data-lucide="users-round" style="width:24px;height:24px"></i><span class="name">users-round</span></div>
  <div class="icon-cell"><i data-lucide="message-circle" style="width:24px;height:24px"></i><span class="name">message</span></div>
  <div class="icon-cell"><i data-lucide="check" style="width:24px;height:24px"></i><span class="name">check</span></div>
  <div class="icon-cell"><i data-lucide="x" style="width:24px;height:24px"></i><span class="name">x</span></div>
  <div class="icon-cell"><i data-lucide="clock" style="width:24px;height:24px"></i><span class="name">clock</span></div>
  <div class="icon-cell"><i data-lucide="globe" style="width:24px;height:24px"></i><span class="name">globe</span></div>
  <div class="icon-cell"><i data-lucide="arrow-right" style="width:24px;height:24px"></i><span class="name">arrow-right</span></div>
</div>
<script>lucide.createIcons();</script>
</div></body></html>
