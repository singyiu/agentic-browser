<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.req { background:var(--bg-2); border-radius:20px; padding:20px 22px; box-shadow:var(--shadow-soft); display:grid; grid-template-columns:1fr auto; gap:18px; align-items:center; }
.url { font-family:var(--font-mono); font-size:14px; color:var(--fg-1); margin-bottom:6px; }
.meta { font-size:13px; color:var(--fg-2); display:flex; gap:10px; align-items:center; }
.dot { width:3px; height:3px; border-radius:999px; background:var(--fg-2); }
.note { margin-top:10px; padding:10px 14px; background:var(--bg-1); border-radius:10px; font-size:14px; color:var(--fg-1); font-style:italic; }
.actions { display:flex; gap:8px; }
.btn { font-family:var(--font-sans); font-size:14px; font-weight:600; padding:10px 16px; border-radius:12px; border:0; cursor:pointer; }
.btn-primary { background:var(--aegis-sage); color:var(--aegis-cream); }
.btn-secondary { background:var(--bg-1); color:var(--fg-1); box-shadow: inset 0 0 0 1px var(--border-1); }
.tag { font-size:11px; font-weight:600; padding:4px 10px; border-radius:999px; color:oklch(0.42 0.10 70); background:var(--aegis-pending-bg); }
</style>
</head><body><div class="card">
<div class="label">Request row — review queue</div>
<div class="req">
  <div>
    <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px"><span class="tag">Pending</span><span style="font-size:13px; color:var(--fg-2)">from <strong style="color:var(--fg-1)">alex</strong></span></div>
    <div class="url">www.youtube.com/watch?v=dQw4w9WgXcQ</div>
    <div class="meta"><span>not on the whitelist yet</span><span class="dot"></span><span>asked 4 min ago</span></div>
    <div class="note">"for my history project — found this in the search"</div>
  </div>
  <div class="actions">
    <button class="btn btn-secondary">Reject</button>
    <button class="btn btn-primary">Approve</button>
  </div>
</div>
</div></body></html>
