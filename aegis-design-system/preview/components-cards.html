<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Card surfaces</div>
<div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px">
  <div style="background:var(--bg-2); border-radius:20px; padding:18px; box-shadow:var(--shadow-soft)">
    <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-1); line-height:1.1">Resting</div>
    <div style="font-size:13px; color:var(--fg-2); margin-top:6px">--shadow-soft, linen fill</div>
  </div>
  <div style="background:var(--bg-2); border-radius:20px; padding:18px; box-shadow:var(--shadow-lifted)">
    <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-1); line-height:1.1">Lifted</div>
    <div style="font-size:13px; color:var(--fg-2); margin-top:6px">--shadow-lifted, on hover</div>
  </div>
  <div style="background:var(--bg-1); border-radius:20px; padding:18px; box-shadow:inset 0 0 0 1px var(--border-1)">
    <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-1); line-height:1.1">Hairline</div>
    <div style="font-size:13px; color:var(--fg-2); margin-top:6px">inset 1px sand, no shadow</div>
  </div>
</div>
</div></body></html>
