<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body><div class="card">
<div class="label">Voice & tone — examples</div>
<div style="display:grid; grid-template-columns:1fr 1fr; gap:14px">
  <div style="background:var(--aegis-sage-soft); padding:16px 18px; border-radius:14px">
    <div style="font-size:11px; font-weight:700; letter-spacing:0.06em; color:var(--aegis-sage); text-transform:uppercase; margin-bottom:8px">Yes</div>
    <div style="font-family:var(--font-display); font-size:22px; line-height:1.15; color:var(--fg-1); margin-bottom:6px">This one needs your parent's okay.</div>
    <div style="font-size:14px; color:var(--fg-2); line-height:1.5">We can ask them for you — add a note if it helps explain why.</div>
  </div>
  <div style="background:var(--aegis-block-bg); padding:16px 18px; border-radius:14px">
    <div style="font-size:11px; font-weight:700; letter-spacing:0.06em; color:var(--aegis-block); text-transform:uppercase; margin-bottom:8px">No</div>
    <div style="font-family:var(--font-sans); font-weight:700; font-size:14px; color:var(--fg-1); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em">ACCESS DENIED</div>
    <div style="font-size:14px; color:var(--fg-2); line-height:1.5">This URL has been classified as inappropriate by the parental authority. Contact your administrator. 🚫</div>
  </div>
</div>
</div></body></html>
