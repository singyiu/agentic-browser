<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.btn { font-family:var(--font-sans); font-size:15px; font-weight:600; line-height:1; padding:13px 20px; border-radius:12px; border:0; cursor:pointer; transition:all 160ms var(--ease-out); display:inline-flex; align-items:center; gap:8px; }
.btn-primary { background:var(--aegis-terracotta); color:var(--aegis-cream); }
.btn-primary:hover { background:var(--aegis-terracotta-2); }
.btn-secondary { background:var(--bg-2); color:var(--fg-1); box-shadow: inset 0 0 0 1px var(--border-1); }
.btn-secondary:hover { background:var(--aegis-oat); }
.btn-ghost { background:transparent; color:var(--fg-1); }
.btn-ghost:hover { background:var(--bg-3); }
.btn-danger { background:transparent; color:var(--aegis-block); box-shadow: inset 0 0 0 1px var(--aegis-block); }
.btn-danger:hover { background:var(--aegis-block-bg); }
.btn-sm { font-size:13px; padding:9px 14px; border-radius:10px; }
</style>
</head><body><div class="card">
<div class="label">Buttons</div>
<div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center">
  <button class="btn btn-primary">Approve</button>
  <button class="btn btn-secondary">Reject</button>
  <button class="btn btn-ghost">Skip</button>
  <button class="btn btn-danger">Remove from whitelist</button>
  <button class="btn btn-primary btn-sm">Ask my parent</button>
  <button class="btn btn-secondary btn-sm">Check if approved</button>
</div>
</div></body></html>
