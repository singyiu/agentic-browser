<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body><div class="card">
<div class="label">Semantic — allow / pending / block</div>
<div class="row">
  <div class="swatch on-dark" style="background:var(--aegis-allow)"><span class="name">Allow</span><span class="code">sage</span></div>
  <div class="swatch on-light" style="background:var(--aegis-allow-bg)"><span class="name">Allow bg</span><span class="code">sage-soft</span></div>
  <div class="swatch on-dark" style="background:var(--aegis-pending)"><span class="name">Pending</span><span class="code">ochre</span></div>
  <div class="swatch on-light" style="background:var(--aegis-pending-bg)"><span class="name">Pending bg</span><span class="code">ochre-soft</span></div>
  <div class="swatch on-dark" style="background:var(--aegis-block)"><span class="name">Block</span><span class="code">brick</span></div>
  <div class="swatch on-light" style="background:var(--aegis-block-bg)"><span class="name">Block bg</span><span class="code">brick-soft</span></div>
</div>
</div></body></html>
