<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body><div class="card">
<div class="label">Dropdown — default height doubled (96px trigger)</div>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:6px">
  <div style="width:100%; height:96px; padding:16px 18px; background:var(--bg-2); border:1px solid var(--border-1); border-radius:16px; display:flex; align-items:center; justify-content:space-between; gap:12px">
    <div>
      <div style="font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-2); margin-bottom:4px">Sort</div>
      <div style="font-size:18px; font-weight:500; color:var(--fg-1); line-height:1.2">Newest first</div>
    </div>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--fg-2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
  </div>
  <div style="width:100%; height:96px; padding:16px 18px; background:var(--bg-2); border:2px solid var(--aegis-terracotta); border-radius:16px; box-shadow: 0 0 0 4px var(--aegis-terracotta-soft); display:flex; align-items:center; justify-content:space-between; gap:12px">
    <div>
      <div style="font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-2); margin-bottom:4px">Filter by teen</div>
      <div style="font-size:18px; font-weight:500; color:var(--fg-1); line-height:1.2">Everyone</div>
    </div>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--aegis-terracotta)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(180deg)"><path d="M6 9l6 6 6-6"/></svg>
  </div>
</div>
</div></body></html>
