<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body><div class="card">
<div class="label">Shadows — warm-tinted</div>
<div style="display:flex; gap:24px; margin-top:8px; padding:8px 4px 16px">
  <div style="flex:1; height:96px; background:var(--bg-2); border-radius:16px; box-shadow:var(--shadow-soft); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; color:var(--fg-2)">--shadow-soft</div>
  <div style="flex:1; height:96px; background:var(--bg-2); border-radius:16px; box-shadow:var(--shadow-lifted); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; color:var(--fg-2)">--shadow-lifted</div>
  <div style="flex:1; height:96px; background:var(--bg-2); border-radius:16px; box-shadow:var(--shadow-inset-hairline); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; color:var(--fg-2)">--shadow-inset-hairline</div>
</div>
</div></body></html>
