<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body><div class="card">
<div class="label">Spacing — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64</div>
<div style="display:flex; align-items:flex-end; gap:14px; margin-top:6px">
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px"><div style="width:4px;  height:4px;  background:var(--aegis-terracotta); border-radius:2px"></div><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2)">4</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px"><div style="width:8px;  height:8px;  background:var(--aegis-terracotta); border-radius:2px"></div><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2)">8</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px"><div style="width:12px; height:12px; background:var(--aegis-terracotta); border-radius:3px"></div><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2)">12</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px"><div style="width:16px; height:16px; background:var(--aegis-terracotta); border-radius:3px"></div><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2)">16</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px"><div style="width:24px; height:24px; background:var(--aegis-terracotta); border-radius:4px"></div><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2)">24</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px"><div style="width:32px; height:32px; background:var(--aegis-terracotta); border-radius:5px"></div><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2)">32</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px"><div style="width:48px; height:48px; background:var(--aegis-terracotta); border-radius:6px"></div><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2)">48</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px"><div style="width:64px; height:64px; background:var(--aegis-terracotta); border-radius:8px"></div><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-2)">64</span></div>
</div>
</div></body></html>
